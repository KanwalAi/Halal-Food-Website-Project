<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="script.js"></script>
</head>
<body>

<div class="signup-container">
  <div class="signup-box">
    <h1>Sign Up</h1>
    <input type="text" id="signupName" class="form-control signup-input" placeholder="Full Name">
    <input type="email" id="signupEmail" class="form-control signup-input" placeholder="Email">
    <input type="password" id="signupPassword" class="form-control signup-input" placeholder="Password">
    <input type="text" id="signupPhone" class="form-control signup-input" placeholder="Phone Number">
    <button onclick="signupUser()" class="btn signup-btn w-100">Sign Up</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
